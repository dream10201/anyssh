<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#111315" />
    <title>AnySSH · 客户端管理</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/admin/" aria-label="AnySSH 管理首页">
          <span class="brand-mark" aria-hidden="true">A</span>
          <span>AnySSH</span>
        </a>
        <span class="topbar-divider"></span>
        <span class="topbar-title">管理控制台</span>
      </div>
    </header>

    <main>
      <div class="page-heading">
        <div>
          <p class="eyebrow">REMOTE ACCESS</p>
          <h1>客户端管理</h1>
          <p class="page-description">管理设备的终端入口、链接轮换与访问权限。</p>
        </div>
        <div class="summary" aria-label="客户端概览">
          <div class="summary-item">
            <strong id="onlineCount">—</strong>
            <span>可访问</span>
          </div>
          <div class="summary-item">
            <strong id="restrictedCount">—</strong>
            <span>受限</span>
          </div>
        </div>
      </div>

      <details class="panel install-panel">
        <summary>
          <span>
            <strong>安装新客户端</strong>
            <small>复制命令到目标设备执行</small>
          </span>
          <span class="summary-action">展开</span>
        </summary>
        <div class="install-content">
          <div class="install-method">
            <div class="install-label">公网地址</div>
            <div class="command-row">
              <code id="publicUrlCommand">加载中...</code>
              <button class="button copy-button" data-copy="publicUrlCommand" type="button" disabled>复制</button>
            </div>
          </div>
          <div class="install-method">
            <div class="install-label">当前直连地址</div>
            <div class="command-row">
              <code id="directUrlCommand">加载中...</code>
              <button class="button copy-button" data-copy="directUrlCommand" type="button" disabled>复制</button>
            </div>
          </div>
        </div>
      </details>

      <section class="clients-section" aria-labelledby="clientsTitle">
        <div class="section-heading">
          <div>
            <h2 id="clientsTitle">已连接客户端</h2>
            <p>访问有效期只限制当前设备的终端入口，不会卸载或停止客户端。</p>
          </div>
          <button class="button ghost" id="refreshClients" type="button">刷新</button>
        </div>
        <div id="clients" class="client-grid" aria-live="polite">
          <div class="grid-placeholder">正在读取客户端…</div>
        </div>
      </section>
    </main>

    <div id="message" class="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
  </body>
</html>
